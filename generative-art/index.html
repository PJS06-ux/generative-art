<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Art Canvas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; cursor: crosshair; }
  #ui {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 10px 18px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
  }
  #ui button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  #ui button:hover { background: rgba(255,255,255,0.2); }
  #ui label { color: rgba(255,255,255,0.6); font-size: 12px; }
  #ui select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
  }
  #hint {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Click or drag to grow — right-click to erase</div>
<div id="ui">
  <label>Style</label>
  <select id="styleSelect">
    <option value="branch">Branching</option>
    <option value="spiral">Spirals</option>
    <option value="web">Web</option>
    <option value="burst">Burst</option>
  </select>
  <button id="clearBtn" aria-label="Clear canvas">Clear</button>
  <button id="saveBtn" aria-label="Save canvas as PNG">Save PNG</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Fade out hint after first interaction
let hintFaded = false;
function fadeHint() {
  if (!hintFaded) { hintFaded = true; hint.style.opacity = 0; }
}

// ---- Particle system ----
const particles = [];
const MAX = 1200;

function hsl(h, s, l, a = 1) {
  return `hsla(${h},${s}%,${l}%,${a})`;
}

class Particle {
  constructor(x, y, angle, hue, style, depth = 0) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.hue = hue;
    this.style = style;
    this.depth = depth;
    this.life = 1;
    this.speed = Math.random() * 1.5 + 0.5;
    this.age = 0;
    this.maxAge = Math.floor(Math.random() * 60 + 40) - depth * 8;
    this.splitAt = Math.floor(this.maxAge * (0.5 + Math.random() * 0.3));
    this.width = Math.max(0.3, 2 - depth * 0.4);
    this.prev = { x, y };
    this.wobble = (Math.random() - 0.5) * 0.04;
    this.dead = false;
  }

  step() {
    if (this.dead) return;
    this.prev = { x: this.x, y: this.y };
    this.age++;

    if (this.style === 'branch') {
      this.angle += this.wobble + Math.sin(this.age * 0.1) * 0.03;
    } else if (this.style === 'spiral') {
      this.angle += 0.06 + this.depth * 0.01;
      this.speed *= 0.995;
    } else if (this.style === 'web') {
      this.angle += this.wobble;
      this.speed = 1.2;
    } else if (this.style === 'burst') {
      this.speed *= 0.97;
      this.angle += this.wobble * 0.5;
    }

    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed;
    this.life = 1 - this.age / this.maxAge;

    if (this.age >= this.maxAge || this.x < 0 || this.x > W || this.y < 0 || this.y > H) {
      this.dead = true;
      return;
    }

    // Draw segment
    ctx.beginPath();
    ctx.moveTo(this.prev.x, this.prev.y);
    ctx.lineTo(this.x, this.y);
    ctx.strokeStyle = hsl(this.hue + this.age * 0.5, 80, 65, this.life * 0.85);
    ctx.lineWidth = this.width * this.life;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Draw glow dot occasionally
    if (this.age % 8 === 0) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.width * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = hsl(this.hue, 90, 80, this.life * 0.4);
      ctx.fill();
    }

    // Split
    if (this.age === this.splitAt && this.depth < 5 && particles.length < MAX) {
      const style = this.style;
      const spread = style === 'web' ? Math.PI / 3 : style === 'burst' ? Math.PI / 4 : Math.PI / 5;
      const branches = style === 'burst' ? 3 : 2;
      for (let i = 0; i < branches; i++) {
        const dir = (i === 0 ? -1 : 1) * spread * (0.6 + Math.random() * 0.4);
        if (particles.length < MAX) {
          particles.push(new Particle(this.x, this.y, this.angle + dir, this.hue + 15, style, this.depth + 1));
        }
      }
      if (style === 'web' && Math.random() < 0.4 && particles.length < MAX) {
        particles.push(new Particle(this.x, this.y, this.angle, this.hue - 20, style, this.depth + 1));
      }
    }
  }
}

function spawn(x, y) {
  const style = document.getElementById('styleSelect').value;
  const hue = Math.random() * 360;
  const count = style === 'burst' ? 8 : style === 'web' ? 5 : 3;
  const spread = style === 'burst' ? Math.PI * 2 : Math.PI / 1.5;
  const baseAngle = Math.random() * Math.PI * 2;

  for (let i = 0; i < count; i++) {
    const angle = style === 'burst'
      ? (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3
      : baseAngle + (Math.random() - 0.5) * spread;
    particles.push(new Particle(x, y, angle, hue + i * 20, style, 0));
  }
}

// ---- Animation loop ----
function loop() {
  requestAnimationFrame(loop);
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].step();
    if (particles[i].dead) particles.splice(i, 1);
  }
}
loop();

// ---- Input handling ----
let drawing = false;
let lastSpawn = 0;

canvas.addEventListener('mousedown', e => {
  if (e.button === 2) return;
  drawing = true;
  fadeHint();
  spawn(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const now = Date.now();
  if (now - lastSpawn > 80) {
    lastSpawn = now;
    spawn(e.clientX, e.clientY);
  }
});

canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  // Erase nearby — paint dark circle
  ctx.beginPath();
  ctx.arc(e.clientX, e.clientY, 60, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0a0f';
  ctx.fill();
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  fadeHint();
  for (const t of e.changedTouches) spawn(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastSpawn > 60) {
    lastSpawn = now;
    for (const t of e.changedTouches) spawn(t.clientX, t.clientY);
  }
}, { passive: false });

// ---- Controls ----
document.getElementById('clearBtn').addEventListener('click', () => {
  particles.length = 0;
  ctx.clearRect(0, 0, W, H);
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = `art-${Date.now()}.png`;
  a.href = canvas.toDataURL();
  a.click();
});
</script>
</body>
</html>
